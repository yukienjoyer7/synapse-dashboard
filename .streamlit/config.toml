[theme]
base = "light"
primaryColor = "#1F4F3F"
backgroundColor = "#FDF6E4"
secondaryBackgroundColor = "#FBEFD3"
textColor = "#33413C"
linkColor = "#1F4F3F"
borderColor = "#E8DFC0"
redColor = "#A2191F"
redBackgroundColor = "#FFF1F1"
redTextColor = "#A2191F"
orangeColor = "#B28600"
orangeBackgroundColor = "#FFF7E0"
orangeTextColor = "#7A5B00"
greenColor = "#006747"
greenBackgroundColor = "#EAF6EE"
greenTextColor = "#006747"
blueColor = "#1F4F3F"
blueBackgroundColor = "#F1E9D0"
blueTextColor = "#2A6354"
violetColor = "#6929C4"
grayColor = "#4B5D56"
chartCategoricalColors = ["#1F4F3F", "#3C7863", "#6929C4", "#1192E8", "#9F1853", "#198038", "#002D9C", "#B28600"]
chartSequentialColors = ["#F1E9D0", "#C1CBB3", "#91AD96", "#618F79", "#3A7662", "#336E5C", "#2C6656", "#275E4F", "#235647", "#1F4F3F"]
dataframeBorderColor = "#E8DFC0"
dataframeHeaderBackgroundColor = "#F1E9D0"
# Generic families keep the interface deterministic when the dashboard runs offline.
font = "sans-serif"
headingFont = "sans-serif"
headingFontSizes = ["2.35rem", "1.65rem", "1.25rem", "1.1rem", "1rem", "0.875rem"]
headingFontWeights = [700, 700, 700, 600, 600, 600]
codeFont = "monospace"
baseFontSize = 15
baseFontWeight = 400
linkUnderline = false
baseRadius = "6px"
buttonRadius = "6px"
showWidgetBorder = true
showSidebarBorder = true

[theme.sidebar]
backgroundColor = "#F1E9D0"
secondaryBackgroundColor = "#FBEFD3"
textColor = "#33413C"
borderColor = "#E8DFC0"
primaryColor = "#1F4F3F"

[browser]
gatherUsageStats = false
